name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go version
      - run: make build
      - run: go test ./... -race -count=1
      - run: go test ./conformance -count=1
      - run: make build-meltilint
      - run: ./out/meltilint ./providers/...
      - run: make build-validate-schemas
      - run: ./out/validate-schemas
      - name: Ensure protocol version bump
        run: |
          git fetch origin main --depth=1 || true
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            if git diff --quiet origin/main... -- protocol/version.go; then
              if ! git diff --quiet origin/main... -- core protocol/schemas protocol/vectors; then
                echo "protocol surface changed without version bump"
                exit 1
              fi
            fi
          else
            echo "origin/main unavailable; skipping protocol version guard"
          fi
